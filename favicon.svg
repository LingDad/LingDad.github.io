<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a5c3a"/>
      <stop offset="100%" stop-color="#0d3320"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#daa520" stroke-width="6"/>
  <!-- Scorpion body -->
  <g fill="url(#gold)" stroke="#8b6914" stroke-width="2" stroke-linejoin="round">
    <!-- Body segments -->
    <ellipse cx="256" cy="300" rx="55" ry="40"/>
    <ellipse cx="256" cy="265" rx="45" ry="30"/>
    <ellipse cx="256" cy="235" rx="38" ry="25"/>
    <!-- Head -->
    <ellipse cx="256" cy="210" rx="30" ry="22"/>
    <!-- Eyes -->
    <circle cx="244" cy="205" r="5" fill="#0d3320"/>
    <circle cx="268" cy="205" r="5" fill="#0d3320"/>
    <!-- Tail segments curving up and over -->
    <ellipse cx="256" cy="345" rx="28" ry="18"/>
    <ellipse cx="248" cy="375" rx="22" ry="16" transform="rotate(-10,248,375)"/>
    <ellipse cx="232" cy="398" rx="18" ry="14" transform="rotate(-25,232,398)"/>
    <ellipse cx="210" cy="410" rx="15" ry="12" transform="rotate(-45,210,410)"/>
    <ellipse cx="185" cy="408" rx="13" ry="11" transform="rotate(-70,185,408)"/>
    <ellipse cx="168" cy="392" rx="12" ry="10" transform="rotate(-90,168,392)"/>
    <ellipse cx="162" cy="370" rx="11" ry="10" transform="rotate(-110,162,370)"/>
    <ellipse cx="165" cy="348" rx="10" ry="10" transform="rotate(-130,165,348)"/>
    <!-- Stinger -->
    <path d="M165,338 Q155,318 160,305 L170,310 Q168,325 170,338Z" fill="#ffd700"/>
    <circle cx="162" cy="302" r="7" fill="#ff4500" stroke="#daa520" stroke-width="1.5"/>
    <!-- Left pincers -->
    <path d="M226,215 Q200,185 175,160 Q165,148 155,155 Q148,165 160,175 L190,200Z" fill="url(#gold)" stroke="#8b6914" stroke-width="2"/>
    <path d="M155,155 Q140,140 130,148 Q125,160 140,165 L155,155Z" fill="url(#gold)" stroke="#8b6914" stroke-width="2"/>
    <!-- Right pincers -->
    <path d="M286,215 Q312,185 337,160 Q347,148 357,155 Q364,165 352,175 L322,200Z" fill="url(#gold)" stroke="#8b6914" stroke-width="2"/>
    <path d="M357,155 Q372,140 382,148 Q387,160 372,165 L357,155Z" fill="url(#gold)" stroke="#8b6914" stroke-width="2"/>
    <!-- Left legs -->
    <path d="M210,250 Q175,240 150,255 Q140,262 148,270 L180,258 Q195,252 210,255Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M205,275 Q168,270 140,290 Q130,298 138,306 L170,290 Q190,280 208,280Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M208,300 Q175,305 148,325 Q138,335 148,340 L172,322 Q192,310 210,308Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M220,320 Q195,332 178,352 Q170,363 180,366 L195,350 Q208,338 225,328Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <!-- Right legs -->
    <path d="M302,250 Q337,240 362,255 Q372,262 364,270 L332,258 Q317,252 302,255Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M307,275 Q344,270 372,290 Q382,298 374,306 L342,290 Q322,280 304,280Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M304,300 Q337,305 364,325 Q374,335 364,340 L340,322 Q320,310 302,308Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
    <path d="M292,320 Q317,332 334,352 Q342,363 332,366 L317,350 Q304,338 287,328Z" fill="url(#gold)" stroke="#8b6914" stroke-width="1.5"/>
  </g>
